# Nixpacks / Railpack configuration for Railway
# Ensures both Python backend and Node.js frontend are built

[phases.setup]
nixPkgs = ["...", "nodejs_20"]

[phases.frontend]
dependsOn = ["setup"]
cmds = [
    "cd frontend && npm ci && npm run build",
    "mkdir -p /app/frontend",
    "cp -r frontend/dist /app/frontend/dist || true",
]

[phases.install]
dependsOn = ["frontend"]

[start]
cmd = "uvicorn backend.app:app --host 0.0.0.0 --port ${PORT:-8000}"
